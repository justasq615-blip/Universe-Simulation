<!DOCTYPE html>
<html>
<head>
  <title>Faasidiagramm</title>
</head>
<body>

<canvas id="canvas" width="500" height="500"></canvas>

<script>
const N = 5;
const steps = 200;

function randomMatrix(n){
  let W = [];
  for(let i=0;i<n;i++){
    W[i] = [];
    for(let j=0;j<n;j++){
      W[i][j] = Math.random()*0.2;
    }
    W[i][i] = 0;
  }
  return W;
}

function matMul(A){
  let n = A.length;
  let R = Array.from({length:n},()=>Array(n).fill(0));

  for(let i=0;i<n;i++){
    for(let j=0;j<n;j++){
      for(let k=0;k<n;k++){
        R[i][j] += A[i][k]*A[k][j];
      }
    }
  }
  return R;
}

function simulate(alpha,beta){
  let W = randomMatrix(N);

  for(let t=0;t<steps;t++){
    let W2 = matMul(W);

    for(let i=0;i<N;i++){
      for(let j=0;j<N;j++){
        W[i][j] += 0.01*(alpha*W2[i][j] - beta*W[i][j]);
        W[i][j] = Math.max(0, Math.min(5, W[i][j]));
      }
    }
  }

  let sum = 0;
  for(let i=0;i<N;i++){
    for(let j=0;j<N;j++){
      sum += W[i][j];
    }
  }
  return sum/(N*N);
}

// lihtne visual (üks tulemus)
let alpha = 0.8;
let beta = 0.3;

let result = simulate(alpha,beta);

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

if(result < 0.2){
  ctx.fillStyle = "blue";
} else if(result < 1){
  ctx.fillStyle = "green";
} else {
  ctx.fillStyle = "red";
}

ctx.fillRect(0,0,500,500);

ctx.fillStyle = "white";
ctx.font = "20px Arial";
ctx.fillText("result: " + result.toFixed(2), 50, 250);

</script>

</body>
</html>
